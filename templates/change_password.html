<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body class="bg-gray-50 font-sans flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border border-gray-200">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">wellcom to laska exam!</h2>
        <p class="text-center text-sm text-red-500 mb-6 font-medium">
            ⚠️ pilce change to Default Password
        </p>

        <form method="POST" action="/change_password" class="space-y-5">
            <div>
                <label class="block text-gray-700 font-medium mb-1">newpassword</label>
                <input type="password" name="new_password" required minlength="4"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500">
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-1">confirm_password</label>
                <input type="password" name="confirm_password" required minlength="4"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500">
            </div>

            <button type="submit" 
                    class="w-full bg-teal-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-teal-700 transition duration-300">
                change password
            </button>
        </form>
    </div>

</body>
</html>
